axios.get("/api/members")
    .then(res => {
        let members = document.getElementById("members");
        res.data.forEach(member => {
            let row = `
                <tr>
                    <td>${member.id}</td>
                    <td>${member.name}</td>
                    <td>${member.email}</td>
                    <td>${member.age}</td>
                </tr>
            `;
            members.innerHTML+=row;
        });
    })
    .cache(error => {
        console.log(error);
    });
</script>
